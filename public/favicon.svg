<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="rezervo-mirage">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#52bb5c"/>
      <stop offset="1" stop-color="#348638"/>
    </linearGradient>
    <!-- Mirage fade: the mark dissolves toward the right, echoing the wordmark. -->
    <linearGradient id="mirage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#bg)"/>
  <text x="16" y="17" fill="url(#mirage)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" text-anchor="middle" dominant-baseline="central" letter-spacing="-0.5">m</text>
</svg>
