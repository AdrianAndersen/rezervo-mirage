name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# prisma generate (run via postinstall) loads prisma.config.ts, which requires
# DATABASE_URL to be set. These jobs never connect to a database, so a dummy
# value is sufficient to let the config load.
env:
  DATABASE_URL: postgresql://user:pass@localhost:5432/db

jobs:
  code_style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: bun ci
      - name: Oxfmt
        run: bun format:check

  type_check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: bun ci
      - name: Type Check
        run: bun typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: bun ci
      - name: Lint
        run: bun lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: bun ci
      - name: Build
        run: bun run build
